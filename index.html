<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المعهد الصحي العالي – واسط</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+Pro:wght@300;400;600&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="rtl">
<header id="site-header"></header>

<section class="hero" id="home">
  <div class="container hero-content">
    <div class="hero-badge" id="h_badge"></div>
    <h1 id="h_title"></h1>
    <p class="subtitle" id="h_subtitle"></p>
    <div class="hero-btns">
      <a href="departments.html" class="btn btn-primary" id="h_btn1"></a>
      <a href="theses.html" class="btn btn-secondary" id="h_btn2"></a>
    </div>
    <div class="hero-stats">
      <div class="stat-item"><span class="stat-num">3</span><span class="stat-label" id="s_depts"></span></div>
      <div class="stat-item"><span class="stat-num">500+</span><span class="stat-label" id="s_grads"></span></div>
      <div class="stat-item"><span class="stat-num">40+</span><span class="stat-label" id="s_fac"></span></div>
      <div class="stat-item"><span class="stat-num" id="s_est_n"></span><span class="stat-label" id="s_founded"></span></div>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center">
      <div>
        <h2 id="a_title"></h2>
        <p id="a_p1"></p><p id="a_p2"></p>
        <a href="about.html" class="btn btn-secondary" id="a_btn"></a>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.2rem">
        <div class="card" style="background:var(--teal-pale);border:none"><div class="card-icon teal"><i class="fas fa-graduation-cap"></i></div><h4 id="f1t"></h4><p style="margin:0;font-size:.9rem;color:var(--gray)" id="f1d"></p></div>
        <div class="card" style="background:rgba(26,54,93,0.05);border:none"><div class="card-icon navy"><i class="fas fa-hospital"></i></div><h4 id="f2t"></h4><p style="margin:0;font-size:.9rem;color:var(--gray)" id="f2d"></p></div>
        <div class="card" style="background:rgba(192,57,43,0.05);border:none"><div class="card-icon accent"><i class="fas fa-flask"></i></div><h4 id="f3t"></h4><p style="margin:0;font-size:.9rem;color:var(--gray)" id="f3d"></p></div>
        <div class="card" style="background:rgba(230,126,34,0.05);border:none"><div class="card-icon orange"><i class="fas fa-users"></i></div><h4 id="f4t"></h4><p style="margin:0;font-size:.9rem;color:var(--gray)" id="f4d"></p></div>
      </div>
    </div>
  </div>
</section>

<section class="section section-alt">
  <div class="container">
    <div class="section-header"><h2 id="od_t"></h2><p id="od_s"></p></div>
    <div class="dept-grid">
      <div class="dept-card">
        <div class="dept-card-top">
          <span class="dept-badge nursing"><i class="fas fa-heartbeat"></i> <span id="dn_b"></span></span>
          <h3 id="dn_n"></h3><p id="dn_d"></p>
        </div>
        <div class="dept-card-body">
          <div class="dept-detail"><i class="fas fa-clock"></i> <span id="dn_du"></span></div>
          <div class="dept-detail"><i class="fas fa-users"></i> <span id="dn_en"></span></div>
          <div class="dept-detail"><i class="fas fa-map-marker-alt"></i> <span id="dn_si"></span></div>
          <div style="margin-top:1.2rem"><a href="departments.html#nursing" class="btn btn-secondary btn-sm" id="dn_bt"></a></div>
        </div>
      </div>
      <div class="dept-card">
        <div class="dept-card-top">
          <span class="dept-badge emergency"><i class="fas fa-ambulance"></i> <span id="de_b"></span></span>
          <h3 id="de_n"></h3><p id="de_d"></p>
        </div>
        <div class="dept-card-body">
          <div class="dept-detail"><i class="fas fa-clock"></i> <span id="de_du"></span></div>
          <div class="dept-detail"><i class="fas fa-users"></i> <span id="de_en"></span></div>
          <div class="dept-detail"><i class="fas fa-map-marker-alt"></i> <span id="de_si"></span></div>
          <div style="margin-top:1.2rem"><a href="departments.html#emergency" class="btn btn-secondary btn-sm" id="de_bt"></a></div>
        </div>
      </div>
      <div class="dept-card">
        <div class="dept-card-top">
          <span class="dept-badge midwifery"><i class="fas fa-baby"></i> <span id="dm_b"></span></span>
          <h3 id="dm_n"></h3><p id="dm_d"></p>
        </div>
        <div class="dept-card-body">
          <div class="dept-detail"><i class="fas fa-clock"></i> <span id="dm_du"></span></div>
          <div class="dept-detail"><i class="fas fa-users"></i> <span id="dm_en"></span></div>
          <div class="dept-detail"><i class="fas fa-map-marker-alt"></i> <span id="dm_si"></span></div>
          <div style="margin-top:1.2rem"><a href="departments.html#midwifery" class="btn btn-secondary btn-sm" id="dm_bt"></a></div>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="section">
  <div class="container">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem">
      <div><h2 style="margin-bottom:.3rem" id="ln_t"></h2><p style="margin:0;color:var(--gray)" id="ln_s"></p></div>
      <a href="news.html" class="btn btn-secondary btn-sm" id="ln_a"></a>
    </div>
    <div class="news-grid" id="homeNewsGrid"></div>
  </div>
</section>

<section class="section section-alt">
  <div class="container">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem">
      <div><h2 style="margin-bottom:.3rem" id="th_t"></h2><p style="margin:0;color:var(--gray)" id="th_s"></p></div>
      <a href="theses.html" class="btn btn-secondary btn-sm" id="th_a"></a>
    </div>
    <div id="homeThesesList"></div>
  </div>
</section>

<section style="background:linear-gradient(135deg,var(--navy) 0%,var(--teal) 100%);padding:3.5rem 0">
  <div class="container" style="text-align:center;color:#fff">
    <h2 style="color:#fff;border:none;margin-bottom:.75rem" id="cs_t"></h2>
    <p style="color:rgba(255,255,255,.8);max-width:560px;margin:0 auto 2rem" id="cs_s"></p>
    <div style="display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap">
      <a href="contact.html" class="btn" style="background:#fff;color:var(--navy)" id="cs_b"></a>
      <a href="mailto:info@hhi-wasit.edu.iq" class="btn btn-secondary" style="border-color:rgba(255,255,255,.5);color:#fff;">info@hhi-wasit.edu.iq</a>
    </div>
  </div>
</section>

<footer id="site-footer"></footer>
<script src="js/i18n.js"></script>
<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
initLang();
const DD = {
  ar:{nursing:'القسم الأكبر، يُعدّ الطلاب لرعاية المرضى في المستشفيات ومراكز الصحة والوحدات المتخصصة.',emergency:'يُدرّب أخصائيين في طوارئ قادرين على إدارة الصدمات وأمراض القلب الحادة والاستجابة للكوارث.',midwifery:'يُخرّج قابلات ماهرات لمرافقة الأمهات خلال الحمل والولادة وما بعد الولادة لخفض وفيات الأمهات.'},
  en:{nursing:'The largest department, preparing students for comprehensive patient care across hospital wards, health centers, and specialized units.',emergency:'Training emergency care specialists capable of managing acute trauma, cardiac emergencies, and disaster response.',midwifery:"Producing skilled midwives to support mothers through pregnancy, delivery, and postnatal care, reducing maternal mortality."}
};
function renderPage() {
  renderHeader('index.html');
  renderFooter();
  const set = (id,val) => { const el=document.getElementById(id); if(el) el.textContent=val; };
  document.getElementById('h_badge').innerHTML='<i class="fas fa-star" style="margin-left:.4rem"></i>'+t('hero_badge');
  set('h_title', t('hero_title').replace('\n',' '));
  set('h_subtitle', t('hero_subtitle'));
  set('h_btn1', t('btn_departments')); set('h_btn2', t('btn_theses'));
  set('s_depts', t('stat_depts')); set('s_grads', t('stat_graduates'));
  set('s_fac', t('stat_faculty'));
  set('s_est_n', LANG==='ar'?'١٩٩٥':'Est. 1995'); set('s_founded', t('stat_founded'));
  set('a_title', t('about_title')); set('a_p1', t('about_p1')); set('a_p2', t('about_p2')); set('a_btn', t('btn_learn_more'));
  set('f1t', t('feat_accredited')); set('f1d', t('feat_accredited_d'));
  set('f2t', t('feat_clinical')); set('f2d', t('feat_clinical_d'));
  set('f3t', t('feat_labs')); set('f3d', t('feat_labs_d'));
  set('f4t', t('feat_faculty')); set('f4d', t('feat_faculty_d'));
  set('od_t', t('our_depts')); set('od_s', t('our_depts_sub'));
  const DL = LANG==='ar'?{nursing:'التمريض',emergency:'الطوارئ',midwifery:'القبالة'}:{nursing:'Nursing',emergency:'Emergency',midwifery:'Midwifery'};
  set('dn_b', DL.nursing); set('dn_n', t('dept_nursing_name')); set('dn_d', DD[LANG].nursing);
  set('dn_du', t('nursing_duration')); set('dn_en', t('nursing_enroll')); set('dn_si', t('nursing_sites')); set('dn_bt', t('dept_details'));
  set('de_b', DL.emergency); set('de_n', t('dept_emergency_name')); set('de_d', DD[LANG].emergency);
  set('de_du', t('nursing_duration')); set('de_en', t('emergency_enroll')); set('de_si', t('emergency_sites')); set('de_bt', t('dept_details'));
  set('dm_b', DL.midwifery); set('dm_n', t('dept_midwifery_name')); set('dm_d', DD[LANG].midwifery);
  set('dm_du', t('nursing_duration')); set('dm_en', t('midwifery_enroll')); set('dm_si', t('midwifery_sites')); set('dm_bt', t('dept_details'));
  set('ln_t', t('latest_news')); set('ln_s', t('latest_news_sub')); set('ln_a', t('all_news'));
  set('th_t', t('theses_lbl')); set('th_s', t('theses_sub')); set('th_a', t('full_archive'));
  set('cs_t', t('contact_strip_title')); set('cs_s', t('contact_strip_sub')); set('cs_b', t('contact_btn'));
  const news = HHI.getNews().sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,3);
  document.getElementById('homeNewsGrid').innerHTML = news.map(n=>`
    <div class="news-card">
      ${n.image ? `<div style="height:160px;overflow:hidden"><img src="${n.image}" style="width:100%;height:100%;object-fit:cover;display:block"></div>` : ''}
      <div class="news-card-header"><span class="news-category">${escHtml(n.category)}</span><span class="news-date">${formatDate(n.date)}</span></div>
      <div class="news-card-body"><h3>${escHtml(n.title)}</h3><p>${escHtml(n.body.substring(0,120))}…</p></div>
      <div class="news-card-footer"><a href="news.html" class="btn btn-secondary btn-sm">${t('read_more')}</a></div>
    </div>`).join('');
  const theses = HHI.getTheses().sort((a,b)=>b.year-a.year).slice(0,3);
  document.getElementById('homeThesesList').innerHTML = theses.map(th=>`
    <div class="thesis-item"><div class="thesis-meta"><span class="thesis-tag ${th.department}">${DL[th.department]}</span><span class="thesis-year">${th.year}</span></div>
    <h4>${escHtml(th.title)}</h4>
    <div class="thesis-author"><i class="fas fa-user" style="margin-left:.4rem;color:var(--teal)"></i>${escHtml(th.author)} | ${t('supervisor_lbl')}: ${escHtml(th.supervisor)}</div>
    <a href="theses.html" class="thesis-download"><i class="fas fa-file-pdf"></i> ${t('view_in_archive')}</a></div>`).join('');
  document.body.classList.toggle('rtl', LANG==='ar');
  document.documentElement.dir = LANG==='ar'?'rtl':'ltr';
  document.documentElement.lang = LANG;
  document.title = LANG==='ar'?'المعهد الصحي العالي – واسط':'Higher Health Institution – Wasit';
}
renderPage();
</script>
</body>
</html>
