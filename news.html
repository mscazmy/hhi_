<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الأخبار – المعهد الصحي العالي واسط</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+Pro:wght@300;400;600&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="rtl">
<header id="site-header"></header>
<div class="page-header">
  <h1 id="ph_t"></h1><p id="ph_s"></p>
  <div class="breadcrumb"><a href="index.html" id="bc_home"></a><span>/</span><span id="bc_cur"></span></div>
</div>
<section class="section">
  <div class="container">
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="">
      <select id="categoryFilter">
        <option value="" id="opt_allcat"></option>
        <option value="Facilities" id="opt_fac"></option>
        <option value="Events" id="opt_ev"></option>
        <option value="Academic" id="opt_ac"></option>
        <option value="Partnerships" id="opt_par"></option>
        <option value="Training" id="opt_tr"></option>
      </select>
      <select id="yearFilter">
        <option value="" id="opt_allyr"></option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
      </select>
    </div>
    <div id="newsCount" style="color:var(--gray);font-size:.9rem;margin-bottom:1.5rem"></div>
    <div class="news-grid" id="newsGrid"></div>
    <div id="noResults" style="display:none;text-align:center;padding:3rem;color:var(--gray)">
      <i class="fas fa-search" style="font-size:2rem;margin-bottom:1rem;display:block;opacity:.4"></i>
      <span id="no_res_txt"></span>
    </div>
  </div>
</section>

<div id="articleModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center;padding:1rem">
  <div style="background:#fff;border-radius:8px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;padding:2.5rem;position:relative">
    <button onclick="closeModal()" style="position:absolute;top:1rem;left:1rem;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--gray)"><i class="fas fa-times"></i></button>
    <div id="modalContent"></div>
  </div>
</div>

<footer id="site-footer"></footer>
<script src="js/i18n.js"></script><script src="js/app.js"></script><script src="js/layout.js"></script>
<script>
initLang();
let allNews = HHI.getNews().sort((a,b)=>new Date(b.date)-new Date(a.date));

const catLabels = {
  ar:{Facilities:'المرافق',Events:'الفعاليات',Academic:'الأكاديمية',Partnerships:'الشراكات',Training:'التدريب'},
  en:{Facilities:'Facilities',Events:'Events',Academic:'Academic',Partnerships:'Partnerships',Training:'Training'}
};

function renderNews(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const cat=document.getElementById('categoryFilter').value;
  const yr=document.getElementById('yearFilter').value;
  const filtered=allNews.filter(n=>{
    const mq=!q||n.title.toLowerCase().includes(q)||n.body.toLowerCase().includes(q);
    const mc=!cat||n.category===cat;
    const my=!yr||new Date(n.date).getFullYear()==yr;
    return mq&&mc&&my;
  });
  document.getElementById('newsCount').textContent = t('showing')+' '+filtered.length+' '+t('items');
  const grid=document.getElementById('newsGrid'), none=document.getElementById('noResults');
  if(!filtered.length){grid.innerHTML='';none.style.display='block';return;}
  none.style.display='none';
  grid.innerHTML=filtered.map(n=>`
    <div class="news-card" style="cursor:pointer" onclick="openArticle(${n.id})">
      ${n.image ? `<div style="height:180px;overflow:hidden;background:#f3f4f6"><img src="${n.image}" style="width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s" onmouseover="this.style.transform='scale(1.04)'" onmouseout="this.style.transform='scale(1)'"></div>` : ''}
      <div class="news-card-header">
        <span class="news-category">${escHtml(catLabels[LANG][n.category]||n.category)}</span>
        <span class="news-date">${formatDate(n.date)}</span>
      </div>
      <div class="news-card-body"><h3>${escHtml(n.title)}</h3><p>${escHtml(n.body.substring(0,140))}…</p></div>
      <div class="news-card-footer" style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:.8rem;color:var(--gray)"><i class="fas fa-user" style="margin-left:.3rem"></i>${escHtml(n.author||'Admin')}</span>
        <span class="btn btn-secondary btn-sm">${t('read_more')}</span>
      </div>
    </div>`).join('');
}

function openArticle(id){
  const n=allNews.find(x=>x.id===id); if(!n) return;
  document.getElementById('modalContent').innerHTML=`
    ${n.image ? `<div style="margin:-2.5rem -2.5rem 1.5rem;height:240px;overflow:hidden;border-radius:8px 8px 0 0"><img src="${n.image}" style="width:100%;height:100%;object-fit:cover"></div>` : ''}
    <div style="display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center">
      <span style="background:var(--teal-pale);color:var(--teal);padding:.3rem .8rem;border-radius:4px;font-size:.75rem;font-weight:700">${escHtml(catLabels[LANG][n.category]||n.category)}</span>
      <span style="color:var(--gray);font-size:.85rem">${formatDate(n.date)}</span>
      <span style="color:var(--gray);font-size:.85rem">${escHtml(n.author||'Admin')}</span>
    </div>
    <h2 style="border:none;font-size:1.6rem;margin-bottom:1.2rem">${escHtml(n.title)}</h2>
    <p style="color:var(--gray-dark);line-height:1.9">${escHtml(n.body)}</p>`;
  document.getElementById('articleModal').style.display='flex';
}
function closeModal(){document.getElementById('articleModal').style.display='none';}
document.getElementById('articleModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.getElementById('searchInput').addEventListener('input',renderNews);
document.getElementById('categoryFilter').addEventListener('change',renderNews);
document.getElementById('yearFilter').addEventListener('change',renderNews);

function renderPage(){
  renderHeader('news.html'); renderFooter();
  document.getElementById('ph_t').textContent=t('page_news_title');
  document.getElementById('ph_s').textContent=t('page_news_sub');
  document.getElementById('bc_home').textContent=t('breadcrumb_home');
  document.getElementById('bc_cur').textContent=t('nav_news');
  document.getElementById('searchInput').placeholder=t('search_news');
  document.getElementById('opt_allcat').textContent=t('all_categories');
  document.getElementById('opt_fac').textContent=catLabels[LANG].Facilities;
  document.getElementById('opt_ev').textContent=catLabels[LANG].Events;
  document.getElementById('opt_ac').textContent=catLabels[LANG].Academic;
  document.getElementById('opt_par').textContent=catLabels[LANG].Partnerships;
  document.getElementById('opt_tr').textContent=catLabels[LANG].Training;
  document.getElementById('opt_allyr').textContent=t('all_years');
  document.getElementById('no_res_txt').textContent=t('no_results');
  document.body.classList.toggle('rtl',LANG==='ar');
  document.documentElement.dir=LANG==='ar'?'rtl':'ltr';
  document.documentElement.lang=LANG;
  document.title=LANG==='ar'?'الأخبار – المعهد الصحي العالي واسط':'News – HHI Wasit';
  renderNews();
}
renderPage();
</script>
</body>
</html>
