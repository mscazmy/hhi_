<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News &amp; Announcements – HHI Wasit</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+Pro:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="site-header"></header>

<div class="page-header">
  <h1>News &amp; Announcements</h1>
  <p>Stay updated with the latest from HHI Wasit</p>
  <div class="breadcrumb">
    <a href="index.html">Home</a>
    <span>/</span>
    <span>News</span>
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="&#xf002;  Search news..." style="font-family:'Font Awesome 6 Free','Source Sans Pro',sans-serif">
      <select id="categoryFilter">
        <option value="">All Categories</option>
        <option value="Facilities">Facilities</option>
        <option value="Events">Events</option>
        <option value="Academic">Academic</option>
        <option value="Partnerships">Partnerships</option>
        <option value="Training">Training</option>
      </select>
      <select id="yearFilter">
        <option value="">All Years</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
      </select>
    </div>

    <div id="newsCount" style="color:var(--gray);font-size:.9rem;margin-bottom:1.5rem"></div>
    <div class="news-grid" id="newsGrid"></div>
    <div id="noResults" style="display:none;text-align:center;padding:3rem;color:var(--gray)">
      <i class="fas fa-search" style="font-size:2rem;margin-bottom:1rem;display:block;opacity:.4"></i>
      No news items found matching your search.
    </div>
  </div>
</section>

<!-- Full article modal -->
<div id="articleModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center;padding:1rem">
  <div style="background:#fff;border-radius:8px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;padding:2.5rem;position:relative">
    <button onclick="closeModal()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--gray)"><i class="fas fa-times"></i></button>
    <div id="modalContent"></div>
  </div>
</div>

<footer id="site-footer"></footer>

<script src="js/app.js"></script>
<script src="js/layout.js"></script>
<script>
  renderHeader('news.html');
  renderFooter();

  let allNews = HHI.getNews().sort((a,b) => new Date(b.date)-new Date(a.date));

  function renderNews() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const cat = document.getElementById('categoryFilter').value;
    const yr = document.getElementById('yearFilter').value;
    const filtered = allNews.filter(n => {
      const matchQ = !q || n.title.toLowerCase().includes(q) || n.body.toLowerCase().includes(q);
      const matchC = !cat || n.category === cat;
      const matchY = !yr || new Date(n.date).getFullYear() == yr;
      return matchQ && matchC && matchY;
    });
    document.getElementById('newsCount').textContent = `Showing ${filtered.length} item${filtered.length!==1?'s':''}`;
    const grid = document.getElementById('newsGrid');
    const none = document.getElementById('noResults');
    if (!filtered.length) { grid.innerHTML=''; none.style.display='block'; return; }
    none.style.display='none';
    grid.innerHTML = filtered.map(n => `
      <div class="news-card" style="cursor:pointer" onclick="openArticle(${n.id})">
        <div class="news-card-header">
          <span class="news-category">${escHtml(n.category)}</span>
          <span class="news-date">${formatDate(n.date)}</span>
        </div>
        <div class="news-card-body">
          <h3>${escHtml(n.title)}</h3>
          <p>${escHtml(n.body.substring(0,140))}…</p>
        </div>
        <div class="news-card-footer" style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:.8rem;color:var(--gray)"><i class="fas fa-user" style="margin-right:.3rem"></i>${escHtml(n.author||'Admin')}</span>
          <span class="btn btn-secondary btn-sm">Read More</span>
        </div>
      </div>`).join('');
  }

  function openArticle(id) {
    const n = allNews.find(x => x.id === id);
    if (!n) return;
    document.getElementById('modalContent').innerHTML = `
      <div style="display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center">
        <span class="news-category" style="background:var(--teal-pale);color:var(--teal);padding:.3rem .8rem;border-radius:4px;font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase">${escHtml(n.category)}</span>
        <span style="color:var(--gray);font-size:.85rem"><i class="fas fa-calendar" style="margin-right:.3rem"></i>${formatDate(n.date)}</span>
        <span style="color:var(--gray);font-size:.85rem"><i class="fas fa-user" style="margin-right:.3rem"></i>${escHtml(n.author||'Admin')}</span>
      </div>
      <h2 style="border:none;font-size:1.6rem;margin-bottom:1.2rem">${escHtml(n.title)}</h2>
      <p style="color:var(--gray-dark);line-height:1.8">${escHtml(n.body)}</p>`;
    const modal = document.getElementById('articleModal');
    modal.style.display = 'flex';
  }
  function closeModal() { document.getElementById('articleModal').style.display = 'none'; }
  document.getElementById('articleModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
  document.getElementById('searchInput').addEventListener('input', renderNews);
  document.getElementById('categoryFilter').addEventListener('change', renderNews);
  document.getElementById('yearFilter').addEventListener('change', renderNews);
  renderNews();
</script>
</body>
</html>
