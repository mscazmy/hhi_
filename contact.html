<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اتصل بنا – المعهد الصحي العالي واسط</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+Pro:wght@300;400;600&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="rtl">
<header id="site-header"></header>
<div class="page-header">
  <h1 id="ph_t"></h1><p id="ph_s"></p>
  <div class="breadcrumb"><a href="index.html" id="bc_home"></a><span>/</span><span id="bc_cur"></span></div>
</div>

<section class="section">
  <div class="container">
    <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:3rem;align-items:start">
      <div>
        <h2 id="git_t"></h2><p id="git_p"></p>
        <div style="display:flex;flex-direction:column;gap:1.4rem;margin-top:2rem">
          <div class="card" style="padding:1.2rem 1.5rem">
            <div style="display:flex;gap:1rem;align-items:center">
              <div class="card-icon teal" style="flex-shrink:0;width:44px;height:44px;margin:0"><i class="fas fa-map-marker-alt"></i></div>
              <div><h4 style="font-size:.95rem;margin-bottom:.2rem" id="addr_lbl"></h4><p style="margin:0;font-size:.9rem;color:var(--gray)" id="addr_val"></p></div>
            </div>
          </div>
          <div class="card" style="padding:1.2rem 1.5rem">
            <div style="display:flex;gap:1rem;align-items:center">
              <div class="card-icon navy" style="flex-shrink:0;width:44px;height:44px;margin:0"><i class="fas fa-phone"></i></div>
              <div><h4 style="font-size:.95rem;margin-bottom:.2rem" id="phone_lbl"></h4><p style="margin:0;font-size:.9rem;color:var(--gray)">+964 23 123 4567<br>+964 23 123 4568</p></div>
            </div>
          </div>
          <div class="card" style="padding:1.2rem 1.5rem">
            <div style="display:flex;gap:1rem;align-items:center">
              <div class="card-icon accent" style="flex-shrink:0;width:44px;height:44px;margin:0"><i class="fas fa-envelope"></i></div>
              <div><h4 style="font-size:.95rem;margin-bottom:.2rem" id="email_lbl"></h4><p style="margin:0;font-size:.9rem"><a href="mailto:info@hhi-wasit.edu.iq">info@hhi-wasit.edu.iq</a><br><a href="mailto:admissions@hhi-wasit.edu.iq">admissions@hhi-wasit.edu.iq</a></p></div>
            </div>
          </div>
          <div class="card" style="padding:1.2rem 1.5rem">
            <div style="display:flex;gap:1rem;align-items:center">
              <div class="card-icon orange" style="flex-shrink:0;width:44px;height:44px;margin:0"><i class="fas fa-clock"></i></div>
              <div><h4 style="font-size:.95rem;margin-bottom:.2rem" id="hours_lbl"></h4><p style="margin:0;font-size:.9rem;color:var(--gray)" id="hours_val"></p></div>
            </div>
          </div>
        </div>
        <div style="margin-top:2rem">
          <h4 id="dept_c_t"></h4>
          <table style="width:100%;font-size:.88rem;margin-top:.75rem;border-collapse:collapse">
            <tr style="border-bottom:1px solid var(--border)"><td style="padding:.6rem 0;font-weight:600" id="dc_nur"></td><td style="padding:.6rem 0"><a href="mailto:nursing@hhi-wasit.edu.iq">nursing@hhi-wasit.edu.iq</a></td></tr>
            <tr style="border-bottom:1px solid var(--border)"><td style="padding:.6rem 0;font-weight:600" id="dc_emr"></td><td style="padding:.6rem 0"><a href="mailto:emergency@hhi-wasit.edu.iq">emergency@hhi-wasit.edu.iq</a></td></tr>
            <tr><td style="padding:.6rem 0;font-weight:600" id="dc_mid"></td><td style="padding:.6rem 0"><a href="mailto:midwifery@hhi-wasit.edu.iq">midwifery@hhi-wasit.edu.iq</a></td></tr>
          </table>
        </div>
      </div>

      <div>
        <div class="card-white" style="background:#fff;border-radius:var(--radius);padding:2.5rem;box-shadow:var(--shadow-md);border:1px solid var(--border)">
          <h3 style="color:var(--navy);margin-bottom:.3rem" id="sm_t"></h3>
          <p style="color:var(--gray);font-size:.9rem;margin-bottom:1.8rem" id="sm_s"></p>
          <div id="formSuccess" class="alert alert-success" style="display:none"><i class="fas fa-check-circle" style="margin-left:.4rem"></i><span id="form_ok"></span></div>
          <div class="form-row">
            <div class="form-group"><label id="fn_lbl"></label><input type="text" id="c_fname" class="form-control" id2="fn_ph"></div>
            <div class="form-group"><label id="ln_lbl"></label><input type="text" id="c_lname" class="form-control"></div>
          </div>
          <div class="form-group"><label id="em_lbl"></label><input type="email" id="c_email" class="form-control" placeholder="your@email.com"></div>
          <div class="form-group">
            <label id="subj_lbl"></label>
            <select id="c_subject" class="form-control">
              <option value="" id="c_s0"></option>
              <option id="c_s1"></option><option id="c_s2"></option>
              <option id="c_s3"></option><option id="c_s4"></option>
              <option id="c_s5"></option><option id="c_s6"></option>
            </select>
          </div>
          <div class="form-group"><label id="msg_lbl"></label><textarea id="c_message" class="form-control" rows="5"></textarea></div>
          <button onclick="sendMessage()" class="btn btn-primary" style="width:100%" id="send_btn"></button>
          <p style="font-size:.78rem;color:var(--gray);margin-top:.75rem;text-align:center" id="form_note"></p>
        </div>
      </div>
    </div>
  </div>
</section>

<footer id="site-footer"></footer>
<script src="js/i18n.js"></script><script src="js/app.js"></script><script src="js/layout.js"></script>
<script>
initLang();
function sendMessage(){
  const f=document.getElementById('c_fname').value.trim();
  const l=document.getElementById('c_lname').value.trim();
  const e=document.getElementById('c_email').value.trim();
  const s=document.getElementById('c_subject').value;
  const m=document.getElementById('c_message').value.trim();
  if(!f||!l||!e||!s||!m){alert(t('fill_all'));return;}
  document.getElementById('formSuccess').style.display='block';
  ['c_fname','c_lname','c_email','c_message'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('c_subject').value='';
}
function renderPage(){
  renderHeader('contact.html'); renderFooter();
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('ph_t',t('page_contact_title')); set('ph_s',t('page_contact_sub'));
  set('bc_home',t('breadcrumb_home')); set('bc_cur',t('nav_contact'));
  set('git_t',t('get_in_touch')); set('git_p',t('contact_p'));
  set('addr_lbl',t('address_lbl')); set('addr_val',t('address_val').replace('\n',', '));
  set('phone_lbl',t('phone_lbl')); set('email_lbl',t('email_lbl'));
  set('hours_lbl',t('hours_lbl')); set('hours_val',t('hours_val').replace('\n','\n'));
  set('dept_c_t',t('dept_contacts'));
  set('dc_nur',LANG==='ar'?'التمريض':'Nursing');
  set('dc_emr',LANG==='ar'?'الطوارئ':'Emergency');
  set('dc_mid',LANG==='ar'?'القبالة':'Midwifery');
  set('sm_t',t('send_message')); set('sm_s',t('reply_time'));
  set('form_ok',t('form_success'));
  set('fn_lbl',t('fname_lbl')); document.getElementById('c_fname').placeholder=t('fname_ph');
  set('ln_lbl',t('lname_lbl')); document.getElementById('c_lname').placeholder=t('lname_ph');
  set('em_lbl',t('email_req')); set('subj_lbl',t('subject_lbl'));
  set('c_s0',t('select_subject')); set('c_s1',t('subj_admissions')); set('c_s2',t('subj_programs'));
  set('c_s3',t('subj_theses')); set('c_s4',t('subj_partnerships'));
  set('c_s5',t('subj_general')); set('c_s6',t('subj_other'));
  set('msg_lbl',t('message_lbl')); document.getElementById('c_message').placeholder=t('message_ph');
  set('send_btn',t('send_btn')); set('form_note',t('form_note'));
  document.body.classList.toggle('rtl',LANG==='ar');
  document.documentElement.dir=LANG==='ar'?'rtl':'ltr';
  document.documentElement.lang=LANG;
  document.title=LANG==='ar'?'اتصل بنا – المعهد الصحي العالي واسط':'Contact – HHI Wasit';
}
renderPage();
</script>
</body>
</html>
